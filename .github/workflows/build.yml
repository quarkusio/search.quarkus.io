name: Build

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - '.gitignore'
      - 'CODEOWNERS'
      - 'LICENSE'
      - '*.md'
      - '*.adoc'
      - '*.txt'
      - '.all-contributorsrc'
  pull_request:
    paths-ignore:
      - '.gitignore'
      - 'CODEOWNERS'
      - 'LICENSE'
      - '*.md'
      - '*.adoc'
      - '*.txt'
      - '.all-contributorsrc'

permissions:
  contents: read

jobs:
  build:
    name: Build

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up JDK 21
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        distribution: temurin
        java-version: 21

    - name: Cache local Maven repository
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Validate formatting and imports
      run: mvn -B clean formatter:validate impsort:check

    - name: Build with Maven
      run: mvn -B install

    # Publish build reports
    - name: Prepare build reports archive
      if: always()
      run: |
        7z a -tzip build-reports.zip -r \
            'target/*-reports/TEST-*.xml' \
            'target/build-report.json' \
            LICENSE.txt
    - name: Upload build reports
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
      if: always()
      with:
        name: "build-reports-${{ github.run_attempt }}-Build"
        path: |
          build-reports.zip
        retention-days: 7
    - name: Produce report and add it as job summary
      uses: quarkusio/action-build-reporter@02e2aea3728e6f31199387eeba0dcdbd18b75159 # main
      if: always()
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        build-reports-artifacts-path: .
